name: Daily Repo Status (No gh aw)

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  daily_status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect repository activity context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          NOW_UTC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "Repository: $REPO" > repo_context.md
          echo "Generated at: $NOW_UTC" >> repo_context.md
          echo "" >> repo_context.md

          echo "## Recent commits (last 20)" >> repo_context.md
          gh api "/repos/$REPO/commits?per_page=20" > commits.json
          jq -r '.[] | "- [\(.sha[0:7])] \(.commit.message | split("\n")[0]) (\(.commit.author.name), \(.commit.author.date))"' commits.json >> repo_context.md || true
          echo "" >> repo_context.md

          echo "## Open pull requests (top 20 by updated)" >> repo_context.md
          gh api "/repos/$REPO/pulls?state=open&sort=updated&direction=desc&per_page=20" > pulls_open.json
          jq -r '.[] | "- PR #\(.number): \(.title) | Updated: \(.updated_at) | URL: \(.html_url)"' pulls_open.json >> repo_context.md || true
          echo "" >> repo_context.md

          echo "## Recently updated issues (top 20)" >> repo_context.md
          gh api "/repos/$REPO/issues?state=all&sort=updated&direction=desc&per_page=20" > issues_recent.json
          jq -r '.[] | select(.pull_request == null) | "- Issue #\(.number): \(.title) | State: \(.state) | Updated: \(.updated_at) | URL: \(.html_url)"' issues_recent.json >> repo_context.md || true
          echo "" >> repo_context.md

          echo "## Releases (latest 10)" >> repo_context.md
          gh api "/repos/$REPO/releases?per_page=10" > releases.json
          jq -r 'if length == 0 then "- No releases found" else .[] | "- \(.name // .tag_name // "untitled") | Published: \(.published_at // "n/a") | URL: \(.html_url // "n/a")" end' releases.json >> repo_context.md || true

      - name: Generate digest with GitHub Copilot CLI
        id: copilot_digest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e

          gh extension install github/gh-copilot >/dev/null 2>&1 || gh extension upgrade github/gh-copilot >/dev/null 2>&1

          cat > copilot_prompt.txt <<'EOF'
          You are preparing a daily maintainer digest for an offline-first PWA project (Expense Tracker).

          Use the repository activity context below to generate a concise status report as markdown.

          Include sections when relevant:
          1) Snapshot
          2) Recent activity
          3) Attention needed
          4) Suggested next steps (2-4 actionable items)

          Style requirements:
          - Positive, factual, concise
          - Easy to scan
          - Avoid naming specific people unless already present in data
          - Link only the most relevant PRs/issues/commits/releases
          - If activity is low, say so plainly

          Repository activity context:
          EOF

          cat repo_context.md >> copilot_prompt.txt

          DIGEST=$(gh copilot suggest -t shell "$(cat copilot_prompt.txt)" 2>/dev/null)

          {
            echo "digest<<EOF"
            if [ -n "$DIGEST" ]; then
              echo "$DIGEST"
            else
              echo "## Snapshot"
              echo "Repository activity appears limited or Copilot output was unavailable in this run."
              echo ""
              echo "## Recent activity"
              echo "- Review the generated context artifact for commits, PRs, and issues."
              echo ""
              echo "## Attention needed"
              echo "- Validate GitHub Copilot CLI availability for Actions if richer summaries are expected."
              echo ""
              echo "## Suggested next steps"
              echo "- Triage open issues updated in the last 24-48 hours."
              echo "- Review open PRs and confirm deployment-related status."
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write status issue body
        run: |
          set -euo pipefail

          TODAY=$(date -u +"%Y-%m-%d")

          cat > issue_body.md <<EOF
          # Daily Repo Status - $TODAY

          ${{ steps.copilot_digest.outputs.digest }}

          ---
          _Generated by Daily Repo Status workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}_
          EOF

      - name: Close older daily status issues
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const openIssues = await github.request('GET /repos/{owner}/{repo}/issues', {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const dailyIssues = openIssues.data.filter(issue =>
              !issue.pull_request && issue.title.startsWith('[daily-repo-status] ')
            );

            dailyIssues.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            for (let i = 1; i < dailyIssues.length; i++) {
              await github.request('PATCH /repos/{owner}/{repo}/issues/{issue_number}', {
                owner,
                repo,
                issue_number: dailyIssues[i].number,
                state: 'closed',
                state_reason: 'not_planned',
              });
            }

      - name: Create daily status issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const body = fs.readFileSync('issue_body.md', 'utf8');
            const today = new Date().toISOString().slice(0, 10);

            await github.request('POST /repos/{owner}/{repo}/issues', {
              owner,
              repo,
              title: `[daily-repo-status] ${today}`,
              body,
            });

      - name: Upload context artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-repo-status-context-${{ github.run_id }}
          path: |
            repo_context.md
            issue_body.md
